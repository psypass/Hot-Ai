# 配置文件
# AI 配置
ai:
  provider: "siliconflow"
  base_url: "https://api.siliconflow.cn/v1"
  model: "zai-org/GLM-4.6"
  temperature: 0.7

# arXiv 配置
arxiv:
  keywords:
    - "machine learning"
    - "deep learning"
    - "computer vision"
    - "natural language processing"
  max_results: 10
  categories:
    - "cs.AI"
    - "cs.LG"
    - "cs.CV"
    - "cs.CL"

# GitHub Trending 配置
github_trending:
  languages:
    - "Python"
    - "TypeScript"
    - "Java"
  topics: []
  time_range: "weekly"
  max_results: 10

# 周报配置
report:
  title: "AI & Tech 周报"
  daily_title: "AI & Tech 日报"
  daily_output_file: "daily_report.md"
  output_file: "weekly_report.md"

dingtalk:
